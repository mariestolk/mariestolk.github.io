<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    rel="icon"
    type="image/png"
    href="{{ '/assets/favicon.png' | relative_url }}"
  >

  {%- seo -%}

  <link
    href="https://unpkg.com/@primer/css/dist/primer.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="{{ '/assets/main.css' | relative_url }}"
  >

  {%- feed_meta -%}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  {% if site.use_math %}
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.11.1/dist/katex.min.css"
      integrity="sha384-zB1R0rpPzHqg7Kpt0Aljp8JPLqbXI3bhnPWROx27a9N0Ll6ZP/+DiW/UqRcLbRjq"
      crossorigin="anonymous"
    >

    <script
      type="text/javascript"
      async
      src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-MML-AM_CHTML"
    ></script>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.11.1/dist/katex.min.js"
      integrity="sha384-y23I5Q6l+B6vatafAwxRu/0oK/79VlbSz7Q9aiSZUvyWYIYsd+qj+o24G5ZU2zJz"
      crossorigin="anonymous"
    ></script>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.11.1/dist/contrib/auto-render.min.js"
      integrity="sha384-kWPLUVMOks5AQFrykwIup5lo0m3iMkkHrD0uJ4H5cjeGihAutqP0yW0J6dpFiVkI"
      crossorigin="anonymous"
    ></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        renderMathInElement(document.body, {
          delimiters: [
            {
              left: "$$",
              right: "$$",
              display: true
            },
            {
              left: "[%",
              right: "%]",
              display: true
            },
            {
              left: "$",
              right: "$",
              display: false
            }
          ]
        });
      });
    </script>
  {% endif %}

  <script>
    function wrap_img(fn) {
      const document_is_ready = document.attachEvent
        ? document.readyState === "complete"
        : document.readyState !== "loading";

      if (document_is_ready) {
        const elements = document.querySelectorAll(".post img");

        Array.prototype.forEach.call(elements, function (element) {
          const image_title = element.getAttribute("title");

          if (image_title) {
            const caption = document.createElement("figcaption");
            const caption_text = document.createTextNode(image_title);
            const wrapper = document.createElement("figure");

            caption.appendChild(caption_text);

            wrapper.className = "image";

            element.parentNode.insertBefore(wrapper, element);
            element.parentNode.removeChild(element);

            wrapper.appendChild(element);
            wrapper.appendChild(caption);
          }
        });
      } else {
        document.addEventListener("DOMContentLoaded", fn);
      }
    }

    window.onload = wrap_img;
  </script>
</head>
